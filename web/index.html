<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#04100a">
<title>CyberHack</title>
<style>
  :root { --bg:#04100a; --fg:#9effc9; --dim:#3f7a5c; --hot:#ff5b6e; --gold:#ffd166; --cyan:#5bd6ff; --mag:#ff7bef; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:ui-monospace,Menlo,Consolas,"DejaVu Sans Mono",monospace; }
  #app { max-width:560px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; padding:10px; }
  h1 { font-size:22px; letter-spacing:3px; margin:6px 0; color:var(--fg); text-shadow:0 0 8px #0f6; }
  .dim { color:var(--dim); }
  .row { display:flex; gap:8px; flex-wrap:wrap; }
  button { font:inherit; background:#0a2a1c; color:var(--fg); border:1px solid var(--dim);
    border-radius:10px; padding:14px 12px; font-size:16px; flex:1 1 auto; min-height:52px; cursor:pointer; }
  button:active { background:#0f3a28; }
  button.big { font-size:18px; letter-spacing:2px; padding:18px; }
  pre { margin:0; white-space:pre; font-size:14px; line-height:1.15; overflow:auto; }
  #map { color:var(--cyan); padding:8px 0; min-height:120px; }
  #map .me{color:#fff;font-weight:bold} #map .obj{color:var(--gold)} #map .hunter{color:var(--hot)} #map .named{color:var(--mag)} #map .q{color:var(--dim)}
  #log { color:var(--dim); flex:1; min-height:90px; padding:6px 0; }
  #log b { color:var(--fg); font-weight:normal; }
  #status { font-size:13px; background:#08251a; border:1px solid var(--dim); border-radius:8px; padding:8px; margin:6px 0; }
  #status .hot{color:var(--hot)} #status .lo{color:var(--hot)} #status .ok{color:var(--fg)}
  .bar { height:8px; background:#0a2a1c; border-radius:4px; overflow:hidden; margin:4px 0; }
  .bar > i { display:block; height:100%; }
  .card { position:fixed; inset:0; background:rgba(2,8,5,.86); display:flex; align-items:flex-end; justify-content:center; }
  .card .inner { width:100%; max-width:560px; background:#06180f; border-top:2px solid var(--hot); border-radius:14px 14px 0 0; padding:14px; }
  .card.siege .inner { border-top-color:var(--hot); } .card.decide .inner { border-top-color:var(--gold); }
  .card h2 { margin:0 0 8px; font-size:14px; letter-spacing:2px; }
  .card p { margin:0 0 10px; font-size:15px; }
  .opt { display:block; width:100%; text-align:left; margin:6px 0; }
  #chron { font-size:15px; line-height:1.4; white-space:pre-wrap; flex:1; padding:8px 0; }
  #chron .foot { color:var(--gold); }
  .hidden { display:none !important; }
  .title-win { color:var(--fg) } .title-die { color:var(--hot) }
  .hint { color:var(--dim); font-size:12px; text-align:center; padding:6px; }
</style>
</head>
<body>
<div id="app">
  <h1>CYBER<span style="color:var(--mag)">HACK</span></h1>

  <!-- START -->
  <section id="screen-start">
    <p class="dim">A cyberspace dive. Watch your daemon crawl the net; steer at the
       decision spikes; break the ICE round by round. Same engine as the deck.</p>
    <p id="memline" class="dim"></p>
    <button class="big" id="btn-jack">JACK IN</button>
    <p class="hint">tap a module each round · husband your buffer · get out alive</p>
  </section>

  <!-- CRAWL -->
  <section id="screen-crawl" class="hidden" style="flex:1; display:flex; flex-direction:column;">
    <pre id="map"></pre>
    <div id="status"></div>
    <pre id="log"></pre>
  </section>

  <!-- OVER -->
  <section id="screen-over" class="hidden" style="flex:1; display:flex; flex-direction:column;">
    <h2 id="over-title"></h2>
    <div id="chron"></div>
    <div class="row">
      <button id="btn-copy">COPY</button>
      <button id="btn-new" class="big">NEW RUN</button>
    </div>
  </section>
</div>

<!-- DECISION CARD -->
<div id="card" class="card hidden"><div class="inner">
  <h2 id="card-title"></h2>
  <p id="card-prompt"></p>
  <div id="card-extra"></div>
  <div id="card-opts"></div>
</div></div>

<script src="cyberhack.js"></script>
<script>
const LS_LEG = "cyberhack.legends", LS_CNET = "cyberhack.cnet";
let CH, S = null, timer = null, paused = false;

function qs(id){ return document.getElementById(id); }
function show(name){ for (const s of ["start","crawl","over"]) qs("screen-"+s).classList.toggle("hidden", s!==name); }

CyberHackModule().then(m => {
  CH = {
    start: m.cwrap("ch_start", null, ["number","number","string"]),
    advance: m.cwrap("ch_advance","number",[]),
    choose: m.cwrap("ch_choose",null,["number"]),
    running: m.cwrap("ch_running","number",[]),
    state: m.cwrap("ch_state","string",[]),
    chronicle: m.cwrap("ch_chronicle","string",[]),
    legends: m.cwrap("ch_legends","string",[]),
  };
  bootMenu();
});

function bootMenu(){
  show("start");
  const leg = localStorage.getItem(LS_LEG) || "";
  const m = leg.match(/runs,(\d+)[\s\S]*?best,(\d+)/);
  qs("memline").textContent = m ? `net memory: ${m[1]} runs, best ${m[2]}` : "a fresh net. nobody knows your deck yet.";
}

function seeds(){
  const url = new URLSearchParams(location.search);
  let cnet = parseInt(url.get("cnet")||"",10);
  if (!cnet) { cnet = parseInt(localStorage.getItem(LS_CNET)||"",10); }
  if (!cnet) { cnet = (Date.now() & 0x7fffffff) | 1; localStorage.setItem(LS_CNET, cnet); }
  let seed = parseInt(url.get("seed")||"",10);
  if (!seed) seed = ((Date.now()>>>0) ^ Math.floor(Math.random()*0x7fffffff)) >>> 0;
  return { cnet, seed };
}

qs("btn-jack").onclick = () => {
  const { cnet, seed } = seeds();
  CH.start(cnet>>>0, seed>>>0, localStorage.getItem(LS_LEG) || "");
  paused = false; show("crawl"); render();
  clearInterval(timer); timer = setInterval(tick, 600);
};

function tick(){
  if (paused) return;
  const ar = CH.advance();          // 0 stepped, 1 decision, 2 ended
  render();
  if (ar === 2) return endRun();
  if (ar === 1) { paused = true; openCard(); }
}

function endRun(){
  clearInterval(timer); timer = null;
  const blob = CH.legends();
  if (blob) localStorage.setItem(LS_LEG, blob);
  const m = blob && blob.match(/citynet,(\d+)/); if (m) localStorage.setItem(LS_CNET, m[1]);
  const text = CH.chronicle();
  S = JSON.parse(CH.state());
  const won = S.r.out === 1;
  qs("over-title").textContent = won ? "JACKED OUT" : "FLATLINED";
  qs("over-title").className = won ? "title-win" : "title-die";
  const lines = text.split("\n").map(l => l.startsWith("[") ? `<span class="foot">${esc(l)}</span>` : esc(l));
  qs("chron").innerHTML = lines.join("\n");
  window._chron = text;
  show("over");
}

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ---- crawl render ----
const TYPE_CH = ["V","G",".","x","A"];
function render(){
  S = JSON.parse(CH.state());
  const r = S.r;
  // map
  let cols = 1; while (cols*cols < S.nc) cols++;
  let rows = Math.ceil(S.nc/cols);
  const grid = Array.from({length:rows}, () => Array(cols*2).fill(" "));
  for (let i=0;i<S.nodes.length;i++){
    const [x,y,type,vis,named] = S.nodes[i];
    let ch="?", cls="q";
    if (i===r.pos){ ch="@"; cls="me"; }
    else if (r.hunt && i===r.hpos){ ch="H"; cls="hunter"; }
    else if (i===S.obj && !r.objdone){ ch="*"; cls="obj"; }
    else if (named){ ch="#"; cls="named"; }
    else if (!vis){ ch="?"; cls="q"; }
    else { ch=TYPE_CH[type]||"."; cls=""; }
    grid[y][x*2] = cls ? `<span class="${cls}">${ch}</span>` : ch;
  }
  qs("map").innerHTML = grid.map(row=>row.join("")).join("\n");
  // status
  const hot = r.heat>=48, lo = r.int*100/r.intmax < 30;
  qs("status").innerHTML =
    `Intg <span class="${lo?'lo':'ok'}">${r.int}/${r.intmax}</span>  ` +
    `Buf ${r.buf}/${r.bufmax}  Heat <span class="${hot?'hot':''}">${r.heat}</span>  ` +
    `Cor ${r.cor}%  T${r.tier}  $${r.sh}`;
  // log
  const log = S.log.map((l,i)=> i===S.log.length-1 ? `<b>${esc(l)}</b>` : esc(l));
  qs("log").innerHTML = log.join("\n");
}

// ---- decision card ----
function openCard(){
  const d = S.dec; if (!d){ paused=false; return; }
  const card = qs("card"), fight = d.kind===0;
  card.classList.remove("hidden");
  card.className = "card " + (fight ? "siege" : "decide");
  qs("card-title").textContent = fight ? "ICE SIEGE" : "DECISION";
  qs("card-prompt").textContent = d.prompt;
  let extra = "";
  if (fight){
    const pct = S.r.ihpmax ? Math.round(S.r.ihp*100/S.r.ihpmax) : 0;
    extra = `<div class="bar"><i style="width:${pct}%;background:var(--hot)"></i></div>` +
            `<div class="dim" style="font-size:13px">buffer ${S.r.buf}/${S.r.bufmax} · corr ${S.r.cor}%</div>`;
  }
  qs("card-extra").innerHTML = extra;
  const wrap = qs("card-opts"); wrap.innerHTML = "";
  d.opts.forEach((o,i)=>{
    const b = document.createElement("button");
    b.className = "opt"; b.textContent = (i+1)+"  "+o;
    b.onclick = ()=>chooseOpt(i);
    wrap.appendChild(b);
  });
}
function chooseOpt(i){
  CH.choose(i);
  render();
  if (!CH.running()){ qs("card").classList.add("hidden"); return endRun(); }
  S = JSON.parse(CH.state());
  if (S.dec){ openCard(); }                  // next siege round / next decision
  else { qs("card").classList.add("hidden"); paused = false; }
}

qs("btn-new").onclick = bootMenu;
qs("btn-copy").onclick = async () => {
  try { await navigator.clipboard.writeText(window._chron||""); qs("btn-copy").textContent="COPIED"; }
  catch(e){ qs("btn-copy").textContent="(copy failed)"; }
};
</script>
</body>
</html>
