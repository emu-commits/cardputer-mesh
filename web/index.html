<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#04100a">
<title>CyberHack</title>
<style>
  :root { --bg:#04100a; --fg:#9effc9; --dim:#3f7a5c; --hot:#ff5b6e; --gold:#ffd166; --cyan:#5bd6ff; --mag:#ff7bef; --panel:#06180f; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:ui-monospace,Menlo,Consolas,"DejaVu Sans Mono",monospace; }
  #app { max-width:560px; margin:0 auto; height:100%; display:flex; flex-direction:column; padding:8px; gap:6px; }
  h1 { font-size:20px; letter-spacing:3px; margin:2px 0; text-shadow:0 0 8px #0f6; }
  .dim { color:var(--dim); }
  button { font:inherit; background:#0a2a1c; color:var(--fg); border:1px solid var(--dim);
    border-radius:10px; padding:12px; font-size:15px; cursor:pointer; }
  button:active { background:#0f3a28; }
  button.big { font-size:18px; letter-spacing:2px; padding:16px; width:100%; }

  /* always-visible chrome */
  #topbar { display:flex; justify-content:space-between; font-size:13px; color:var(--dim); }
  #status { font-size:13px; background:#08251a; border:1px solid var(--dim); border-radius:8px; padding:7px 9px; }
  #status .lo{color:var(--hot)} #status .hot{color:var(--hot)} #status b{color:var(--fg);font-weight:600}
  #map { color:var(--cyan); white-space:pre; font-size:14px; line-height:1.12; padding:6px 0; overflow:auto;
         border-bottom:1px solid #0d3324; min-height:118px; }
  #map .me{color:#fff;font-weight:bold} #map .obj{color:var(--gold)} #map .hunter{color:var(--hot)} #map .named{color:var(--mag)} #map .q{color:var(--dim)}
  #fightline { font-size:13px; min-height:18px; }
  #fightline .bar{display:inline-block;width:90px;height:8px;background:#0a2a1c;border-radius:4px;vertical-align:middle;overflow:hidden;margin:0 6px}
  #fightline .bar>i{display:block;height:100%;background:var(--hot)}
  #log { flex:1; min-height:48px; overflow:auto; white-space:pre-wrap; font-size:13px; color:var(--dim); }
  #log b{color:var(--fg);font-weight:400}

  /* decision panel — docked at bottom, never covers map/status */
  #decision { border:1px solid var(--gold); border-radius:10px; background:var(--panel); padding:10px; }
  #decision.siege{border-color:var(--hot)}
  #decision h2{margin:0 0 6px;font-size:13px;letter-spacing:2px;color:var(--gold)}
  #decision p{margin:0 0 8px;font-size:14px}
  #decision .opt{display:block;width:100%;text-align:left;margin:5px 0}

  #chron { flex:1; overflow:auto; white-space:pre-wrap; font-size:15px; line-height:1.4; }
  #chron .foot{color:var(--gold)}
  .hidden{display:none !important}
  .hint{color:var(--dim);font-size:12px;text-align:center}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pgrid button{height:60px;display:flex;flex-direction:column;justify-content:center}
  .pgrid small{color:var(--dim);font-size:11px;font-weight:400;margin-top:3px}
</style>
</head>
<body>
<div id="app">
  <h1>CYBER<span style="color:var(--mag)">HACK</span></h1>

  <!-- START -->
  <section id="screen-start" style="display:flex;flex-direction:column;gap:10px;flex:1">
    <p class="dim" style="margin:0">Pick a decker profile (your directive). The deck auto-runs the net and
       fights the ICE for you; you steer at the route forks, extraction, and survival crises.</p>
    <p id="memline" class="dim" style="margin:0"></p>
    <div class="pgrid" id="pgrid"></div>
    <p class="hint">status & the net map stay on screen the whole dive</p>
  </section>

  <!-- PLAY: status + map are ALWAYS visible here -->
  <section id="screen-play" class="hidden" style="flex:1;display:flex;flex-direction:column;gap:6px;min-height:0">
    <div id="topbar"><span id="loc"></span><span id="netname">NIGHT-NET</span></div>
    <div id="status"></div>
    <div id="map"></div>
    <div id="fightline"></div>
    <div id="log"></div>
    <button id="btn-jackout" class="hidden">JACK OUT &amp; BANK</button>
    <div id="decision" class="hidden"></div>
  </section>

  <!-- OVER -->
  <section id="screen-over" class="hidden" style="flex:1;display:flex;flex-direction:column;gap:8px;min-height:0">
    <h2 id="over-title" style="margin:0"></h2>
    <div id="over-status" style="font-size:13px"></div>
    <div id="chron"></div>
    <div style="display:flex;gap:8px">
      <button id="btn-copy" style="flex:1">COPY</button>
      <button id="btn-new" class="big" style="flex:2">NEW RUN</button>
    </div>
  </section>
</div>

<script src="cyberhack.js"></script>
<script>
const LS_LEG = "cyberhack.legends", LS_CNET = "cyberhack.cnet";
const PROFILES = [
  ["Reckless","raw aggression · rich · short-lived"],
  ["Cautious","right tool, stay alive · steady"],
  ["Opportunist","detour for loot · fight smart"],
  ["Loyalist","careful · spares friendly factions"],
];
let CH, S = null, timer = null, paused = false, pers = 1;

const qs = id => document.getElementById(id);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function show(name){ for (const s of ["start","play","over"]) qs("screen-"+s).classList.toggle("hidden", s!==name); }

CyberHackModule().then(m => {
  CH = {
    start: m.cwrap("ch_start", null, ["number","number","number","string"]),
    advance: m.cwrap("ch_advance","number",[]),
    choose: m.cwrap("ch_choose",null,["number"]),
    jack_out: m.cwrap("ch_jack_out",null,[]),
    running: m.cwrap("ch_running","number",[]),
    state: m.cwrap("ch_state","string",[]),
    chronicle: m.cwrap("ch_chronicle","string",[]),
    legends: m.cwrap("ch_legends","string",[]),
  };
  bootMenu();
});

function bootMenu(){
  show("start");
  const grid = qs("pgrid"); grid.innerHTML = "";
  PROFILES.forEach((p,i)=>{
    const b = document.createElement("button");
    b.innerHTML = `<span>${p[0]}</span><small>${p[1]}</small>`;
    b.onclick = ()=>jackIn(i);
    grid.appendChild(b);
  });
  const leg = localStorage.getItem(LS_LEG) || "";
  const mm = leg.match(/runs,(\d+)[\s\S]*?best,(\d+)/);
  qs("memline").textContent = mm ? `net memory: ${mm[1]} runs, best ${mm[2]}` : "a fresh net. nobody knows your deck yet.";
}

function seeds(){
  const url = new URLSearchParams(location.search);
  let cnet = parseInt(url.get("cnet")||"",10) || parseInt(localStorage.getItem(LS_CNET)||"",10);
  if (!cnet) { cnet = (Date.now() & 0x7fffffff) | 1; localStorage.setItem(LS_CNET, cnet); }
  let seed = parseInt(url.get("seed")||"",10) || (((Date.now()>>>0) ^ Math.floor(Math.random()*0x7fffffff)) >>> 0);
  return { cnet, seed };
}

function jackIn(p){
  pers = p;
  const { cnet, seed } = seeds();
  CH.start(cnet>>>0, seed>>>0, p, localStorage.getItem(LS_LEG) || "");
  paused = false; show("play"); qs("decision").classList.add("hidden"); render();
  clearInterval(timer); timer = setInterval(tick, 650);
}

function tick(){
  if (paused) return;
  const ar = CH.advance();        // combat auto-resolves inside the engine
  render();
  if (ar === 2) return endRun();
  if (ar === 1) { paused = true; openDecision(); }   // only forks/extract/survival
}

function endRun(){
  clearInterval(timer); timer = null;
  const blob = CH.legends();
  if (blob) { localStorage.setItem(LS_LEG, blob); const m = blob.match(/citynet,(\d+)/); if (m) localStorage.setItem(LS_CNET, m[1]); }
  window._chron = CH.chronicle();
  S = JSON.parse(CH.state());
  const won = S.r.out === 1;
  qs("over-title").textContent = won ? "JACKED OUT" : "FLATLINED";
  qs("over-title").style.color = won ? "var(--fg)" : "var(--hot)";
  qs("over-status").innerHTML = statusHTML(S.r);
  qs("chron").innerHTML = window._chron.split("\n").map(l => l.startsWith("[") ? `<span class="foot">${esc(l)}</span>` : esc(l)).join("\n");
  show("over");
}

// ---- always-visible chrome ----
const TYPE_CH = ["V","G",".","x","A"];
const NODE_PREFIX = ["GRID","NODE","VAULT","RELAY","GHOST","CACHE","SPIRE","SUMP","HOLLOW","EXCHANGE"];
function statusHTML(r){
  const lo = r.int*100/r.intmax < 30, hot = r.heat>=48;
  return `Intg <b class="${lo?'lo':''}">${r.int}/${r.intmax}</b> · Buf <b>${r.buf}/${r.bufmax}</b> · ` +
         `Heat <b class="${hot?'hot':''}">${r.heat}</b> · Cor <b>${r.cor}%</b> · T<b>${r.tier}</b> · ` +
         `<b>L${r.depth+1}</b> · obj <b>${r.objs}</b> · $<b>${r.sh}</b>`;
}
function render(){
  S = JSON.parse(CH.state());
  const r = S.r;
  qs("loc").textContent = "@ " + nodeLabel(r.pos);
  qs("status").innerHTML = statusHTML(r);
  // map
  let cols = 1; while (cols*cols < S.nc) cols++;
  const rows = Math.ceil(S.nc/cols);
  const grid = Array.from({length:rows}, () => Array(cols*2).fill(" "));
  for (let i=0;i<S.nodes.length;i++){
    const [x,y,type,vis,named] = S.nodes[i];
    let ch="?", cls="q";
    if (i===r.pos){ ch="@"; cls="me"; }
    else if (r.hunt && i===r.hpos){ ch="H"; cls="hunter"; }
    else if (i===S.obj && !r.objdone){ ch="*"; cls="obj"; }
    else if (named){ ch="#"; cls="named"; }
    else if (!vis){ ch="?"; cls="q"; }
    else { ch=TYPE_CH[type]||"."; cls=""; }
    grid[y][x*2] = cls ? `<span class="${cls}">${ch}</span>` : ch;
  }
  qs("map").innerHTML = grid.map(row=>row.join("")).join("\n");
  // fight line (auto-combat siege, shown without covering anything)
  if (r.fight){
    const pct = r.ihpmax ? Math.round(r.ihp*100/r.ihpmax) : 0;
    qs("fightline").innerHTML = `<span class="hot">&#9876; breaking ICE</span> <span class="bar"><i style="width:${pct}%"></i></span> ${r.ihp}/${r.ihpmax}`;
  } else qs("fightline").innerHTML = "";
  // log
  qs("log").innerHTML = S.log.map((l,i)=> i===S.log.length-1 ? `<b>${esc(l)}</b>` : esc(l)).join("\n");
  qs("log").scrollTop = qs("log").scrollHeight;
  // persistent JACK OUT — available out of combat once you've banked something to take
  qs("btn-jackout").classList.toggle("hidden", !(r.objs > 0 && !r.fight && !paused));
}
function nodeLabel(i){ const n=S.nodes[i]; return n ? NODE_PREFIX[n[5] % NODE_PREFIX.length]+"-"+(i+1) : "?"; }

// ---- decision panel (docked; map + status stay visible above) ----
function openDecision(){
  const d = S.dec; if (!d){ paused=false; return; }
  const el = qs("decision");
  el.className = d.kind===0 ? "siege" : "";
  el.classList.remove("hidden");
  const label = d.kind===5?"DESCENT":d.kind===4?"EXTRACTION":d.kind===3?"SURVIVAL":"ROUTE";
  let html = `<h2>${label}</h2><p>${esc(d.prompt)}</p>`;
  d.opts.forEach((o,i)=> html += `<button class="opt" data-i="${i}">${i+1}  ${esc(o)}</button>`);
  el.innerHTML = html;
  el.querySelectorAll("button").forEach(b=> b.onclick = ()=>chooseOpt(parseInt(b.dataset.i,10)));
}
function chooseOpt(i){
  CH.choose(i); render();
  if (!CH.running()){ qs("decision").classList.add("hidden"); return endRun(); }
  S = JSON.parse(CH.state());
  if (S.dec){ openDecision(); }
  else { qs("decision").classList.add("hidden"); paused = false; }
}

qs("btn-jackout").onclick = () => { CH.jack_out(); if (!CH.running()) endRun(); };
qs("btn-new").onclick = bootMenu;
qs("btn-copy").onclick = async () => {
  try { await navigator.clipboard.writeText(window._chron||""); qs("btn-copy").textContent="COPIED"; }
  catch(e){ qs("btn-copy").textContent="(failed)"; }
};
</script>
</body>
</html>
