; CYD-side dumb ANSI terminal for the Cardputer Deck.
; Target: ESP32-2432S028R (WROOM-32E, 2.8" 240x320 ILI9341, resistive touch).
;
; Two environments:
;   cyd        -> production: reads the ANSI stream from the Cardputer on
;                 Serial1 RX = GPIO35 @ 921600 (Port-A, input-only pin, RX only).
;   cyd-bench  -> bench test: reads the ANSI stream from the USB serial (UART0),
;                 so we can pipe the emulator's output straight from the PC with
;                 no Cardputer and no extra wiring.
;
; If the panel is garbled/inverted on first flash, the board is the ST7789 rev:
; swap  -D ILI9341_2_DRIVER=1  for  -D ST7789_DRIVER=1  (and try TFT_RGB_ORDER).

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = bodmer/TFT_eSPI@^2.5.43
build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=1
    -D LOAD_GLCD=1
    -D SPI_FREQUENCY=55000000

[env:cyd]
; production: ANSI in on GPIO35 from the Cardputer over Port-A
build_flags = ${env.build_flags}

[env:cyd-bench]
; bench: ANSI in on the USB serial from the PC (pipe the emulator into it)
build_flags = ${env.build_flags} -D TERM_FROM_USB=1
